apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mariemmehri/repo-config
    targetRevision: main
    path: charts/todo-app
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: false        # pas de suppression auto en prod, trop risqué
      selfHeal: true
    syncOptions:
      - CreateNamespace=true