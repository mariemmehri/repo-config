apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mariemmehri/repo-config
    targetRevision: main
    path: charts/todo-app
    helm:
      # Le pipeline CI remplace ces tags par le SHA du commit.
      # On garde ce fichier comme source de vérité GitOps.
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
